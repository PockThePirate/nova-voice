name: build1555

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROIDSDK: /usr/local/lib/android/sdk
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Accept licenses and install SDK packages
        run: |
          # Add cmdline-tools to PATH
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"
          
          # Accept licenses
          yes | sdkmanager --licenses || true
          
          # Install required packages
          sdkmanager "platforms;android-33" "build-tools;33.0.2" "platform-tools"
          
          # Create symlink for buildozer (it expects tools/bin/sdkmanager)
          mkdir -p $ANDROID_HOME/tools/bin
          ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager $ANDROID_HOME/tools/bin/sdkmanager

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install buildozer
        run: pip install buildozer cython

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake cmake gettext libltdl-dev libtool pkg-config \
            zip unzip zlib1g-dev libncurses-dev \
            libffi-dev libssl-dev libbz2-dev libreadline-dev libsqlite3-dev liblzma-dev

      - name: Build APK (debug)
        if: github.event.inputs.build_type != 'release'
        run: buildozer android debug

      - name: Build APK (release)
        if: github.event.inputs.build_type == 'release'
        run: buildozer android release

      - name: List output
        if: always()
        run: |
          ls -la bin/ || echo "No bin directory"
          find . -name "*.apk" 2>/dev/null || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nova-voice-apk
          path: |
            bin/*.apk
          retention-days: 30
          if-no-files-found: warn