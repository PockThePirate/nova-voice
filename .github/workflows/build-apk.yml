name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install buildozer
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            cmake \
            gettext \
            libltdl-dev \
            libtool \
            pkg-config \
            zip \
            unzip \
            zlib1g-dev \
            openjdk-17-jdk \
            libncurses-dev \
            libffi-dev \
            libssl-dev \
            libbz2-dev \
            libreadline-dev \
            libsqlite3-dev \
            liblzma-dev

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Download Vosk model
        run: |
          mkdir -p vosk-model
          cd vosk-model
          wget -q https://alphacephei.com/vosk/models/vosk-model-small-en-us-0.15.zip || true
          if [ -f vosk-model-small-en-us-0.15.zip ]; then
            unzip -q vosk-model-small-en-us-0.15.zip || true
            rm vosk-model-small-en-us-0.15.zip || true
          fi

      - name: Build APK (debug)
        if: github.event.inputs.build_type != 'release'
        run: |
          ls -la
          buildozer android debug 2>&1 | tee build.log || {
            echo "Build failed. Showing last 100 lines of log:"
            tail -100 build.log
            exit 1
          }

      - name: Build APK (release)
        if: github.event.inputs.build_type == 'release'
        run: |
          buildozer android release 2>&1 | tee build.log || {
            echo "Build failed. Showing last 100 lines of log:"
            tail -100 build.log
            exit 1
          }

      - name: List output directory
        if: always()
        run: |
          ls -la bin/ || echo "No bin directory found"
          find . -name "*.apk" 2>/dev/null || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nova-voice-apk
          path: |
            bin/*.apk
            ./*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload build log on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Create release
        if: github.event.inputs.build_type == 'release' && github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          files: bin/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}