name: build1453

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install buildozer
        run: |
          pip install buildozer cython

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake cmake gettext libltdl-dev libtool pkg-config \
            zip unzip zlib1g-dev openjdk-17-jdk libncurses-dev \
            libffi-dev libssl-dev libbz2-dev libreadline-dev libsqlite3-dev liblzma-dev

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-33" "build-tools;33.0.0" "platform-tools"

      - name: Link Android SDK for buildozer
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk
          # Link the SDK installed by setup-android to where buildozer expects it
          cp -r $ANDROID_HOME/* ~/.buildozer/android/platform/android-sdk/ || true
          # Create cmdline-tools directory structure that buildozer expects
          mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest
          cp -r $ANDROID_HOME/cmdline-tools/latest/* ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/ 2>/dev/null || true

      - name: Build APK (debug)
        if: github.event.inputs.build_type != 'release'
        run: |
          buildozer android debug

      - name: Build APK (release)
        if: github.event.inputs.build_type == 'release'
        run: |
          buildozer android release

      - name: List output
        if: always()
        run: |
          ls -la bin/ || echo "No bin directory"
          find . -name "*.apk" 2>/dev/null || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nova-voice-apk
          path: |
            bin/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload build log on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-log
          retention-days: 7