# Include ONCE inside nginx ``http { }`` (e.g. ``include /path/to/nginx-option-b-http-snippet.conf;``).
# Pair with nginx-option-b-server-snippet.conf inside your TLS ``server { }`` for novamission.cloud.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream mission_control_asgi {
    server 127.0.0.1:8001;
    keepalive 8;
}
