# Mission Control nginx — v7: static alias without try_files
#
# try_files + alias breaks /static/* (nginx tests wrong path → 404 for all css/js).
# Apply:
#   sudo cp .../deploy/nginx-site-mission_control-v7-static-alias.conf /etc/nginx/sites-available/mission_control
#   sudo nginx -t && sudo systemctl reload nginx

server {
    server_name novamission.cloud;

    location /static/nova_audio/ {
        alias /home/pock/.openclaw/workspace/mission_control/static/nova_audio/;
        expires 1h;
        add_header Cache-Control "public, no-cache, must-revalidate";
    }

    location /static/ {
        alias /home/pock/.openclaw/workspace/mission_control/staticfiles/;
        expires 1h;
        add_header Cache-Control "public, no-cache, must-revalidate";
    }

    location /ws/audio/nova {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
        proxy_cache off;
        gzip off;
    }

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/novamission.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/novamission.cloud/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = novamission.cloud) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name novamission.cloud;
    return 404;
}
