# Drop-in replacement for /etc/nginx/sites-available/mission_control
# Fix: /ws/audio/nova was proxy_pass to 127.0.0.1:9000 — use 8001 (uvicorn mission_control.asgi).
#
# Apply on server:
#   sudo cp /etc/nginx/sites-available/mission_control /etc/nginx/sites-available/mission_control.bak
#   sudo cp /path/to/mission_control/deploy/nginx-site-mission_control.conf /etc/nginx/sites-available/mission_control
#   sudo nginx -t && sudo systemctl reload nginx

server {
    server_name novamission.cloud;

    location /ws/audio/nova {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/novamission.cloud/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/novamission.cloud/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = novamission.cloud) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name novamission.cloud;
    return 404; # managed by Certbot


}
