# Mission Control nginx config — Option B: Single ASGI upstream
# Fixes audio playback by proxying all traffic to uvicorn (port 8001)
#
# Nova TTS MP3s: the app returns URLs under /api/nova/audio/<uuid>.mp3 (Django FileResponse, login_required).
# Proxy / to ASGI so those GETs hit Django — no separate nginx static block needed for TTS files.
#
# (Legacy) If NOVA_AUDIO_URL_PREFIX=/static/nova_audio/, Django writes to STATIC_ROOT/nova_audio/ when DEBUG=False.
# Uvicorn + Django do not serve /static/ when DEBUG=False unless you use WhiteNoise or nginx.
# Recommended for static-only URLs: serve collected static + runtime nova_audio from disk, proxy the rest to ASGI:
#
#   location /static/ {
#       alias /path/to/mission_control/staticfiles/;
#       add_header Cache-Control "public, max-age=3600";
#   }
#   # Ensures /static/nova_audio/*.mp3 (written at runtime) is readable; same alias tree as STATIC_ROOT.
#
# If you keep "proxy everything" to uvicorn, set DEBUG=True only for local dev, or add WhiteNoise.
#
# Installation:
#   sudo cp /home/pock/.openclaw/workspace/mission_control/deploy/nginx-site-mission_control-fixed.conf /etc/nginx/sites-available/mission_control
#   sudo nginx -t && sudo systemctl reload nginx

http {
    # WebSocket upgrade map (must be in http context, not server)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream mission_control_asgi {
        server 127.0.0.1:8001;
        keepalive 8;
    }
}

server {
    server_name novamission.cloud;

    # WebSocket endpoint for Nova voice streaming
    location /ws/audio/nova {
        proxy_pass http://mission_control_asgi;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # All other traffic (HTTP views, static files, API endpoints)
    location / {
        proxy_pass http://mission_control_asgi;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/novamission.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/novamission.cloud/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = novamission.cloud) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name novamission.cloud;
    return 404;
}
